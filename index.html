<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CabinetIQ — AI project estimator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#18160f;
    --panel:#221f16;
    --panel-2:#2b271a;
    --line:#3c3626;
    --line-soft:#2f2b1f;
    --timber:#c98a45;
    --timber-dark:#8f5a26;
    --blueprint:#6fa3ab;
    --blueprint-dim:#4d7880;
    --text:#efe8d8;
    --text-dim:#a89d84;
    --text-faint:#786d54;
    --danger:#c1543f;
    --good:#7fa86a;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    letter-spacing:0.2px;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

  /* header */
  .app-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:26px;border-bottom:1px solid var(--line);padding-bottom:18px;}
  .app-head .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{width:30px;height:30px;border:1.5px solid var(--timber);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--timber);}
  .brand h1{font-size:19px;font-weight:600;}
  .brand .sub{font-size:11px;color:var(--text-faint);font-family:'IBM Plex Mono';letter-spacing:0.5px;text-transform:uppercase;}

  /* dimension-line divider, the signature motif */
  .dim-rule{display:flex;align-items:center;gap:8px;margin:34px 0 18px;color:var(--blueprint);}
  .dim-rule svg{flex-shrink:0;}
  .dim-rule .label{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--blueprint);white-space:nowrap;}
  .dim-rule .track{flex:1;height:9px;position:relative;}
  .dim-rule .track svg{width:100%;height:9px;display:block;}

  /* stepper */
  .stepper{display:flex;gap:2px;margin-bottom:8px;}
  .step-tab{flex:1;padding:10px 8px;background:var(--panel);border:1px solid var(--line-soft);border-bottom:none;cursor:default;position:relative;}
  .step-tab .n{font-family:'IBM Plex Mono';font-size:11px;color:var(--text-faint);}
  .step-tab .t{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .step-tab.active{background:var(--panel-2);}
  .step-tab.active .n{color:var(--timber);}
  .step-tab.active .t{color:var(--text);}
  .step-tab.done .n{color:var(--good);}
  .step-tab.clickable{cursor:pointer;}
  .step-tab.clickable:hover{background:var(--panel-2);}

  .panel{background:var(--panel-2);border:1px solid var(--line);border-radius:0 0 var(--radius) var(--radius);padding:26px;}

  label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px;font-family:'IBM Plex Mono';letter-spacing:0.3px;}
  input[type=text],input[type=number],input[type=email],textarea,select{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:var(--radius);padding:9px 11px;font-family:'Inter';font-size:14px;margin-bottom:16px;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--timber);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px;}

  .btn{
    font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:0.3px;
    background:transparent;color:var(--timber);border:1px solid var(--timber-dark);
    padding:11px 20px;border-radius:var(--radius);cursor:pointer;
  }
  .btn:hover{background:rgba(201,138,69,0.1);}
  .btn.primary{background:var(--timber);color:#1c1710;border-color:var(--timber);}
  .btn.primary:hover{background:#d99a55;}
  .btn.ghost{border-color:var(--line);color:var(--text-dim);}
  .btn.ghost:hover{color:var(--text);border-color:var(--text-dim);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-row{display:flex;justify-content:space-between;margin-top:24px;}

  .hint{font-size:12px;color:var(--text-faint);margin:-10px 0 16px;line-height:1.5;}
  .badge{display:inline-block;font-family:'IBM Plex Mono';font-size:11px;padding:2px 8px;border-radius:20px;letter-spacing:0.3px;}
  .badge.conf-high{background:rgba(127,168,106,0.15);color:var(--good);}
  .badge.conf-mid{background:rgba(201,138,69,0.15);color:var(--timber);}
  .badge.conf-low{background:rgba(193,84,63,0.15);color:var(--danger);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-family:'IBM Plex Mono';font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;padding:8px 8px;border-bottom:1px solid var(--line);}
  td{padding:8px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
  td input{margin:0;padding:6px 8px;font-size:13px;}
  tr:last-child td{border-bottom:none;}
  .num{text-align:right;font-family:'IBM Plex Mono';}
  .row-del{color:var(--text-faint);cursor:pointer;font-size:16px;background:none;border:none;padding:0 4px;}
  .row-del:hover{color:var(--danger);}

  .upload-zone{border:1.5px dashed var(--line);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;color:var(--text-dim);}
  .upload-zone:hover{border-color:var(--timber);color:var(--text);}
  .upload-zone.has-file{border-style:solid;padding:16px;}
  .thumb{max-width:100%;max-height:340px;border-radius:4px;display:block;margin:0 auto;}

  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--timber);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:-2px;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .cost-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;}
  .cost-line.total{border-top:1px solid var(--line);border-bottom:none;margin-top:6px;padding-top:14px;font-family:'Space Grotesk';font-weight:600;font-size:17px;color:var(--timber);}
  .cost-line .lbl{color:var(--text-dim);}
  .cost-line.total .lbl{color:var(--text);}

  .rates-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 0;margin-bottom:20px;}

  #err-box{background:rgba(193,84,63,0.1);border:1px solid var(--danger);color:#e79c90;padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;}

  /* quote / print */
  .quote-sheet{background:#fbf8f0;color:#1c1710;border-radius:var(--radius);padding:38px;}
  .quote-sheet .qhead{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1c1710;padding-bottom:16px;margin-bottom:20px;}
  .quote-sheet h2{font-size:22px;}
  .quote-sheet .muted{color:#6b6250;font-size:12.5px;}
  .quote-sheet table{font-size:13px;}
  .quote-sheet th{color:#6b6250;border-bottom-color:#d8d0bc;}
  .quote-sheet td{border-bottom-color:#eee7d6;}
  .quote-sheet .cost-line{border-bottom-color:#eee7d6;}
  .quote-sheet .cost-line .lbl{color:#6b6250;}
  .quote-sheet .cost-line.total{border-top-color:#1c1710;color:#8f5a26;}
  .quote-sheet .terms{font-size:11px;color:#8a806a;margin-top:26px;line-height:1.6;}

  @media print{
    body *{visibility:hidden;}
    #print-area, #print-area *{visibility:visible;}
    #print-area{position:absolute;top:0;left:0;width:100%;}
    .no-print{display:none !important;}
  }
  @media (max-width:640px){
    .grid2,.grid3,.rates-grid{grid-template-columns:1fr;}
    .stepper{flex-wrap:wrap;}
    .step-tab{flex:1 1 33%;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ---------- state ---------- */
const state = {
  step: 1,
  project: { customerName:'', customerEmail:'', projectName:'', address:'', roomType:'Kitchen' },
  company: { name:'Northside Joinery', abn:'', email:'quotes@northsidejoinery.com.au', phone:'' },
  image: null,
  analyzing:false,
  analysisError:'',
  analysis: null,
  cabinets: [],
  rates: {
    mdf:85, hmr:110, front:145, hinge:4.5, handle:6,
    labour:65, install:75, delivery:150, margin:25, gst:10
  }
};

const STEPS = [
  {n:'01', t:'Project'},
  {n:'02', t:'Plan & AI analysis'},
  {n:'03', t:'Estimate'},
  {n:'04', t:'Quote'}
];

/* ---------- helpers ---------- */
function fmtMoney(v){
  return new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD'}).format(Math.round(v*100)/100);
}
function fmtNum(v,d=2){ return Number(v).toFixed(d); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function dimRule(labelText){
  return '<div class="dim-rule"><span class="label">' + labelText + '</span><span class="track"><svg viewBox="0 0 100 9" preserveAspectRatio="none"><line x1="0" y1="4.5" x2="100" y2="4.5" stroke="currentColor" stroke-width="1"/><line x1="0" y1="0" x2="0" y2="9" stroke="currentColor" stroke-width="1"/><line x1="100" y1="0" x2="100" y2="9" stroke="currentColor" stroke-width="1"/></svg></span></div>';
}

/* ---------- estimate engine ---------- */
function computeEstimate(){
  const cabs = state.cabinets;
  let wetArea=0, dryArea=0, frontArea=0, hinges=0, handles=0, count=cabs.length;
  cabs.forEach(c=>{
    const w=Number(c.width_mm)||0, h=Number(c.height_mm)||0, d=Number(c.depth_mm)||0;
    const carcassM2 = (2*(h*d) + (w*h) + (w*d)) / 1e6;
    const frontM2 = (Number(c.doors)>0 || Number(c.drawers)>0) ? (w*h)/1e6 : 0;
    if(c.type==='base'){ wetArea += carcassM2; } else { dryArea += carcassM2; }
    frontArea += frontM2;
    hinges += (Number(c.doors)||0)*2;
    handles += (Number(c.doors)||0) + (Number(c.drawers)||0);
  });
  const SHEET=2.88, WASTE=1.10;
  const hmrSheets = Math.ceil((wetArea*WASTE)/SHEET) || 0;
  const mdfSheets = Math.ceil((dryArea*WASTE)/SHEET) || 0;
  const frontSheets = Math.ceil((frontArea*WASTE)/SHEET) || 0;
  const shopHours = count*(0.5+0.75);
  const installHours = count*0.4;

  const r = state.rates;
  const materialCost = mdfSheets*r.mdf + hmrSheets*r.hmr + frontSheets*r.front;
  const hardwareCost = hinges*r.hinge + handles*r.handle;
  const labourCost = shopHours*r.labour;
  const installCost = installHours*r.install;
  const deliveryCost = count>0 ? Number(r.delivery) : 0;
  const subtotal = materialCost+hardwareCost+labourCost+installCost+deliveryCost;
  const marginAmt = subtotal*(r.margin/100);
  const preGst = subtotal+marginAmt;
  const gstAmt = preGst*(r.gst/100);
  const grandTotal = preGst+gstAmt;

  return {
    count, wetArea, dryArea, frontArea, hmrSheets, mdfSheets, frontSheets,
    hinges, handles, shopHours, installHours,
    materialCost, hardwareCost, labourCost, installCost, deliveryCost,
    subtotal, marginAmt, preGst, gstAmt, grandTotal
  };
}

/* ---------- image handling ---------- */
function handleFile(file){
  if(!file) return;
  const isPdf = file.type === 'application/pdf';
  const isImg = file.type.startsWith('image/');
  if(!isPdf && !isImg){
    state.analysisError = 'Please upload a PDF, PNG, or JPG of the plan.';
    render();
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    state.image = { base64: reader.result.split(',')[1], mediaType: file.type, name: file.name, dataUrl: reader.result, isPdf: isPdf };
    state.analysisError='';
    state.analysis=null;
    state.cabinets=[];
    render();
  };
  reader.readAsDataURL(file);
}

async function analyzePlan(){
  if(!state.image) return;
  state.analyzing = true;
  state.analysisError = '';
  render();

  const prompt = "You are the plan-reading engine inside a cabinetry estimating tool. Study the attached image (a floor plan, cabinet elevation, or joinery sketch) and identify every distinct cabinet unit.\n\nRespond with ONLY valid JSON, no markdown fences, no commentary, matching this exact shape:\n{\n  \"room_name\": \"string, best guess of the room or area shown\",\n  \"confidence\": 0.0,\n  \"cabinets\": [\n    {\"type\": \"base\", \"width_mm\": 600, \"height_mm\": 720, \"depth_mm\": 560, \"doors\": 1, \"drawers\": 0}\n  ],\n  \"notes\": \"one or two sentences on anything unclear, unusual, or worth the estimator double-checking\"\n}\n\nRules:\n- \"type\" must be one of: base, wall, tall.\n- Estimate width_mm/height_mm/depth_mm using standard Australian cabinetry conventions if dimensions aren't labelled (base ~720mm high x 560-600mm deep, wall ~720mm high x 300-350mm deep, tall/pantry ~2100mm high x 560-600mm deep).\n- List each cabinet run as separate units where boundaries are visible; if the plan only shows a total run length, split it into standard 300-900mm wide units.\n- confidence is 0 to 1, reflecting how legible and complete the plan is.\n- If the image is not a floor plan or cabinet drawing at all, return an empty cabinets array, confidence near 0, and explain in notes.";

  try{
    const resp = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{
          role:'user',
          content:[
            state.image.isPdf
              ? { type:'document', source:{ type:'base64', media_type:'application/pdf', data: state.image.base64 } }
              : { type:'image', source:{ type:'base64', media_type: state.image.mediaType, data: state.image.base64 } },
            { type:'text', text: prompt }
          ]
        }]
      })
    });
    if(!resp.ok){
      let detail = 'status ' + resp.status;
      try{ const errJson = await resp.json(); if(errJson.error) detail = errJson.error; }catch(e){}
      throw new Error(detail);
    }
    const data = await resp.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const cleaned = textBlocks.replace(/```json/g,'').replace(/```/g,'').trim();
    const parsed = JSON.parse(cleaned);

    state.analysis = {
      room_name: parsed.room_name || 'Unnamed room',
      confidence: typeof parsed.confidence === 'number' ? parsed.confidence : 0.5,
      notes: parsed.notes || ''
    };
    state.cabinets = (parsed.cabinets||[]).map((c,i)=>({
      id: 'c'+Date.now()+i,
      type: ['base','wall','tall'].includes(c.type) ? c.type : 'base',
      width_mm: Number(c.width_mm)||600,
      height_mm: Number(c.height_mm)||720,
      depth_mm: Number(c.depth_mm)||560,
      doors: Number(c.doors)||0,
      drawers: Number(c.drawers)||0
    }));
    if(!state.project.roomType || state.project.roomType==='Kitchen'){
      state.project.roomType = state.analysis.room_name;
    }
  }catch(err){
    state.analysisError = 'Analysis failed: ' + err.message + '. You can retry, or add cabinets manually below.';
  }finally{
    state.analyzing = false;
    render();
  }
}

/* ---------- cabinet table mutators ---------- */
function addCabinet(){
  state.cabinets.push({ id:'c'+Date.now(), type:'base', width_mm:600, height_mm:720, depth_mm:560, doors:1, drawers:0 });
  render();
}
function removeCabinet(id){
  state.cabinets = state.cabinets.filter(c=>c.id!==id);
  render();
}
function updateCabinetField(id, field, value){
  const c = state.cabinets.find(c=>c.id===id);
  if(!c) return;
  c[field] = (field==='type') ? value : Number(value);
}

/* ---------- rate mutators (targeted DOM update, no full rerender) ---------- */
function onRateInput(key, value){
  state.rates[key] = Number(value)||0;
  paintTotals();
}
function paintTotals(){
  const est = computeEstimate();
  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent = val; };
  set('t-mdf-sheets', est.mdfSheets);
  set('t-hmr-sheets', est.hmrSheets);
  set('t-front-sheets', est.frontSheets);
  set('t-hinges', est.hinges);
  set('t-handles', est.handles);
  set('t-shop-hours', fmtNum(est.shopHours,1));
  set('t-install-hours', fmtNum(est.installHours,1));
  set('t-material-cost', fmtMoney(est.materialCost));
  set('t-hardware-cost', fmtMoney(est.hardwareCost));
  set('t-labour-cost', fmtMoney(est.labourCost));
  set('t-install-cost', fmtMoney(est.installCost));
  set('t-delivery-cost', fmtMoney(est.deliveryCost));
  set('t-subtotal', fmtMoney(est.subtotal));
  set('t-margin', fmtMoney(est.marginAmt));
  set('t-pregst', fmtMoney(est.preGst));
  set('t-gst', fmtMoney(est.gstAmt));
  set('t-grand', fmtMoney(est.grandTotal));
}

/* ---------- nav ---------- */
function goStep(n){
  if(n>state.step && !canAdvance(state.step)) return;
  state.step = n;
  render();
}
function canAdvance(fromStep){
  if(fromStep===1) return state.project.customerName.trim()!=='' && state.project.projectName.trim()!=='';
  if(fromStep===2) return state.cabinets.length>0;
  return true;
}
function next(){ if(canAdvance(state.step)) goStep(state.step+1); }
function prev(){ goStep(state.step-1); }

/* ---------- field updater for project/company ---------- */
function setField(group, key, value){
  state[group][key] = value;
  refreshGate();
}
function refreshGate(){
  const btn = document.getElementById('continue-btn');
  if(btn) btn.disabled = !canAdvance(state.step);
  const nextTab = document.getElementById('step-tab-' + (state.step+1));
  if(nextTab){
    const ok = canAdvance(state.step);
    nextTab.classList.toggle('clickable', ok);
    nextTab.onclick = ok ? function(){ goStep(state.step+1); } : null;
  }
}

/* ---------- render ---------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML =
    '<div class="app-head"><div class="brand"><div class="mark">CQ</div><div><h1>CabinetIQ</h1><div class="sub">AI project estimator</div></div></div>' +
    '<div class="sub mono" style="text-align:right;color:var(--text-faint);font-size:11px;">prototype build<br>web reference</div></div>' +
    renderStepper() +
    '<div class="panel">' + renderStepBody() + '</div>';
  if(state.step===3) paintTotals();
}

function renderStepper(){
  return '<div class="stepper">' + STEPS.map((s,i)=>{
    const idx=i+1;
    const cls = idx===state.step?'active':(idx<state.step?'done':'');
    const clickable = idx<=state.step || (idx===state.step+1 && canAdvance(state.step));
    return '<div id="step-tab-' + idx + '" class="step-tab ' + cls + ' ' + (clickable?'clickable':'') + '" ' + (clickable?('onclick="goStep(' + idx + ')"'):'') + '>' +
      '<div class="n mono">' + s.n + '</div><div class="t">' + s.t + '</div></div>';
  }).join('') + '</div>';
}

function renderStepBody(){
  if(state.step===1) return renderStep1();
  if(state.step===2) return renderStep2();
  if(state.step===3) return renderStep3();
  if(state.step===4) return renderStep4();
  return '';
}

/* ---- step 1: project ---- */
function renderStep1(){
  const p = state.project, c = state.company;
  return dimRule('Customer & project') +
    '<div class="grid2">' +
    '<div><label>Customer name</label><input type="text" value="' + esc(p.customerName) + '" oninput="setField(\'project\',\'customerName\',this.value)" placeholder="Jordan Michaels"></div>' +
    '<div><label>Customer email</label><input type="text" value="' + esc(p.customerEmail) + '" oninput="setField(\'project\',\'customerEmail\',this.value)" placeholder="jordan@example.com"></div>' +
    '<div><label>Project name</label><input type="text" value="' + esc(p.projectName) + '" oninput="setField(\'project\',\'projectName\',this.value)" placeholder="Michaels Kitchen Reno"></div>' +
    '<div><label>Room / area</label><input type="text" value="' + esc(p.roomType) + '" oninput="setField(\'project\',\'roomType\',this.value)" placeholder="Kitchen"></div>' +
    '<div style="grid-column:1/-1;"><label>Site address</label><input type="text" value="' + esc(p.address) + '" oninput="setField(\'project\',\'address\',this.value)" placeholder="14 Wattle St, Brisbane QLD"></div>' +
    '</div>' +
    dimRule('Your business') +
    '<div class="grid2">' +
    '<div><label>Business name</label><input type="text" value="' + esc(c.name) + '" oninput="setField(\'company\',\'name\',this.value)"></div>' +
    '<div><label>ABN</label><input type="text" value="' + esc(c.abn) + '" oninput="setField(\'company\',\'abn\',this.value)" placeholder="00 000 000 000"></div>' +
    '<div><label>Quotes email</label><input type="text" value="' + esc(c.email) + '" oninput="setField(\'company\',\'email\',this.value)"></div>' +
    '<div><label>Phone</label><input type="text" value="' + esc(c.phone) + '" oninput="setField(\'company\',\'phone\',this.value)" placeholder="07 0000 0000"></div>' +
    '</div>' +
    '<div class="btn-row"><span></span><button id="continue-btn" class="btn primary" onclick="next()" ' + (canAdvance(1)?'':'disabled') + '>Continue to plan upload</button></div>';
}

/* ---- step 2: upload + AI analysis ---- */
function renderStep2(){
  let uploadBlock;
  if(!state.image){
    uploadBlock =
      '<div class="upload-zone" onclick="document.getElementById(\'file-input\').click()">' +
      '<div style="font-size:14px;margin-bottom:6px;">Drop a plan here or click to browse</div>' +
      '<div class="hint" style="margin:0;">Floor plans, cabinet elevations, or hand sketches — PDF, PNG, or JPG</div></div>' +
      '<input id="file-input" type="file" accept="image/*,application/pdf" style="display:none" onchange="handleFile(this.files[0])">';
  }else{
    const preview = state.image.isPdf
      ? '<embed src="' + state.image.dataUrl + '" type="application/pdf" style="width:100%;height:380px;border:none;border-radius:4px;">'
      : '<img class="thumb" src="' + state.image.dataUrl + '">';
    uploadBlock =
      '<div class="upload-zone has-file">' + preview + '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">' +
      '<span class="hint" style="margin:0;">' + esc(state.image.name) + '</span>' +
      '<button class="btn ghost" onclick="document.getElementById(\'file-input-2\').click()">Replace file</button>' +
      '<input id="file-input-2" type="file" accept="image/*,application/pdf" style="display:none" onchange="handleFile(this.files[0])"></div>';
  }

  let analysisBlock = '';
  if(state.image){
    if(state.analyzing){
      analysisBlock = '<div class="hint" style="margin-top:20px;"><span class="spin"></span>Reading the plan and identifying cabinets…</div>';
    }else if(state.analysisError){
      analysisBlock = '<div id="err-box" style="margin-top:20px;">' + esc(state.analysisError) + '</div><button class="btn" onclick="analyzePlan()">Retry analysis</button>';
    }else if(!state.analysis){
      analysisBlock = '<div style="margin-top:20px;"><button class="btn primary" onclick="analyzePlan()">Analyze with AI</button></div>';
    }else{
      analysisBlock = renderAnalysisResult();
    }
  }

  return dimRule('Upload the plan') + uploadBlock + analysisBlock +
    '<div class="btn-row"><button class="btn ghost" onclick="prev()">Back</button>' +
    '<button class="btn primary" onclick="next()" ' + (canAdvance(2)?'':'disabled') + '>Continue to estimate</button></div>';
}

function confBadge(conf){
  const pct = Math.round(conf*100);
  const cls = conf>=0.7?'conf-high':(conf>=0.4?'conf-mid':'conf-low');
  return '<span class="badge ' + cls + '">' + pct + '% confidence</span>';
}

function renderAnalysisResult(){
  const a = state.analysis;
  return dimRule('AI analysis result') +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div><strong>' + esc(a.room_name) + '</strong></div>' + confBadge(a.confidence) + '</div>' +
    (a.notes ? ('<div class="hint" style="margin-top:0;">' + esc(a.notes) + '</div>') : '') +
    renderCabinetTable() +
    '<button class="btn ghost" style="margin-top:12px;" onclick="addCabinet()">+ Add cabinet manually</button>';
}

function renderCabinetTable(){
  if(state.cabinets.length===0){
    return '<div class="hint">No cabinets detected yet. Add one manually to continue.</div>';
  }
  const rows = state.cabinets.map(c=>
    '<tr><td><select onchange="updateCabinetField(\'' + c.id + '\',\'type\',this.value)" style="margin:0;padding:6px 8px;">' +
    '<option value="base" ' + (c.type==='base'?'selected':'') + '>Base</option>' +
    '<option value="wall" ' + (c.type==='wall'?'selected':'') + '>Wall</option>' +
    '<option value="tall" ' + (c.type==='tall'?'selected':'') + '>Tall</option></select></td>' +
    '<td><input type="number" value="' + c.width_mm + '" onchange="updateCabinetField(\'' + c.id + '\',\'width_mm\',this.value)"></td>' +
    '<td><input type="number" value="' + c.height_mm + '" onchange="updateCabinetField(\'' + c.id + '\',\'height_mm\',this.value)"></td>' +
    '<td><input type="number" value="' + c.depth_mm + '" onchange="updateCabinetField(\'' + c.id + '\',\'depth_mm\',this.value)"></td>' +
    '<td><input type="number" value="' + c.doors + '" onchange="updateCabinetField(\'' + c.id + '\',\'doors\',this.value)"></td>' +
    '<td><input type="number" value="' + c.drawers + '" onchange="updateCabinetField(\'' + c.id + '\',\'drawers\',this.value)"></td>' +
    '<td><button class="row-del" onclick="removeCabinet(\'' + c.id + '\')" aria-label="Remove cabinet">&times;</button></td></tr>'
  ).join('');
  return '<table><thead><tr><th>Type</th><th>Width mm</th><th>Height mm</th><th>Depth mm</th><th>Doors</th><th>Drawers</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
}

/* ---- step 3: estimate ---- */
function renderStep3(){
  const r = state.rates;
  return dimRule('Detected cabinets — edit before pricing') +
    renderCabinetTable() +
    '<button class="btn ghost" style="margin-top:12px;" onclick="addCabinet()">+ Add cabinet manually</button>' +
    dimRule('Rates & pricing rules') +
    '<div class="rates-grid">' +
    '<div><label>MDF sheet ($/sheet)</label><input type="number" value="' + r.mdf + '" oninput="onRateInput(\'mdf\',this.value)"></div>' +
    '<div><label>HMR sheet ($/sheet)</label><input type="number" value="' + r.hmr + '" oninput="onRateInput(\'hmr\',this.value)"></div>' +
    '<div><label>Door/drawer front sheet ($/sheet)</label><input type="number" value="' + r.front + '" oninput="onRateInput(\'front\',this.value)"></div>' +
    '<div><label>Hinge ($/each)</label><input type="number" value="' + r.hinge + '" oninput="onRateInput(\'hinge\',this.value)"></div>' +
    '<div><label>Handle ($/each)</label><input type="number" value="' + r.handle + '" oninput="onRateInput(\'handle\',this.value)"></div>' +
    '<div><label>Shop labour ($/hr)</label><input type="number" value="' + r.labour + '" oninput="onRateInput(\'labour\',this.value)"></div>' +
    '<div><label>Install labour ($/hr)</label><input type="number" value="' + r.install + '" oninput="onRateInput(\'install\',this.value)"></div>' +
    '<div><label>Delivery (flat $)</label><input type="number" value="' + r.delivery + '" oninput="onRateInput(\'delivery\',this.value)"></div>' +
    '<div><label>Margin (%)</label><input type="number" value="' + r.margin + '" oninput="onRateInput(\'margin\',this.value)"></div>' +
    '<div><label>GST (%)</label><input type="number" value="' + r.gst + '" oninput="onRateInput(\'gst\',this.value)"></div>' +
    '</div>' +
    dimRule('Materials & hardware') +
    '<div class="cost-line"><span class="lbl">MDF sheets required</span><span class="mono" id="t-mdf-sheets"></span></div>' +
    '<div class="cost-line"><span class="lbl">HMR sheets required</span><span class="mono" id="t-hmr-sheets"></span></div>' +
    '<div class="cost-line"><span class="lbl">Door/drawer front sheets</span><span class="mono" id="t-front-sheets"></span></div>' +
    '<div class="cost-line"><span class="lbl">Hinges</span><span class="mono" id="t-hinges"></span></div>' +
    '<div class="cost-line"><span class="lbl">Handles</span><span class="mono" id="t-handles"></span></div>' +
    '<div class="cost-line"><span class="lbl">Shop hours (CNC + assembly)</span><span class="mono" id="t-shop-hours"></span></div>' +
    '<div class="cost-line"><span class="lbl">Install hours</span><span class="mono" id="t-install-hours"></span></div>' +
    dimRule('Cost breakdown') +
    '<div class="cost-line"><span class="lbl">Materials</span><span class="mono" id="t-material-cost"></span></div>' +
    '<div class="cost-line"><span class="lbl">Hardware</span><span class="mono" id="t-hardware-cost"></span></div>' +
    '<div class="cost-line"><span class="lbl">Labour — shop</span><span class="mono" id="t-labour-cost"></span></div>' +
    '<div class="cost-line"><span class="lbl">Labour — install</span><span class="mono" id="t-install-cost"></span></div>' +
    '<div class="cost-line"><span class="lbl">Delivery</span><span class="mono" id="t-delivery-cost"></span></div>' +
    '<div class="cost-line"><span class="lbl">Subtotal</span><span class="mono" id="t-subtotal"></span></div>' +
    '<div class="cost-line"><span class="lbl">Margin</span><span class="mono" id="t-margin"></span></div>' +
    '<div class="cost-line"><span class="lbl">Before GST</span><span class="mono" id="t-pregst"></span></div>' +
    '<div class="cost-line"><span class="lbl">GST</span><span class="mono" id="t-gst"></span></div>' +
    '<div class="cost-line total"><span class="lbl">Total</span><span class="mono" id="t-grand"></span></div>' +
    '<div class="hint" style="margin-top:18px;">Material and labour figures are a simplified estimation model (surface-area and per-unit heuristics) for fast quoting — not a cut-optimised or nesting-accurate takeoff. Review before sending.</div>' +
    '<div class="btn-row"><button class="btn ghost" onclick="prev()">Back</button><button class="btn primary" onclick="next()">Continue to quote</button></div>';
}

/* ---- step 4: quote ---- */
function renderStep4(){
  const est = computeEstimate();
  const p = state.project, c = state.company;
  const today = new Date().toLocaleDateString('en-AU', {day:'numeric',month:'long',year:'numeric'});
  const quoteNo = 'Q-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random()*900+100));

  const lineItems = [
    ['Cabinetry materials (MDF, HMR, fronts)', est.materialCost],
    ['Hardware (hinges, handles)', est.hardwareCost],
    ['Shop labour', est.labourCost],
    ['Installation', est.installCost],
    ['Delivery', est.deliveryCost]
  ];
  const lineRows = lineItems.map(function(pair){
    return '<div class="cost-line"><span class="lbl">' + pair[0] + '</span><span class="mono">' + fmtMoney(pair[1]) + '</span></div>';
  }).join('');

  const baseCount = state.cabinets.filter(function(x){return x.type==='base';}).length;
  const wallCount = state.cabinets.filter(function(x){return x.type==='wall';}).length;
  const tallCount = state.cabinets.filter(function(x){return x.type==='tall';}).length;

  return '<div id="print-area"><div class="quote-sheet">' +
    '<div class="qhead"><div><h2>' + (esc(c.name)||'Your business') + '</h2>' +
    '<div class="muted">' + (c.abn ? ('ABN ' + esc(c.abn)) : '') + '</div>' +
    '<div class="muted">' + esc(c.email) + (c.phone?(' · ' + esc(c.phone)):'') + '</div></div>' +
    '<div style="text-align:right;"><div class="muted mono">' + quoteNo + '</div><div class="muted">' + today + '</div></div></div>' +
    '<div class="grid2" style="margin-bottom:6px;">' +
    '<div><div class="muted" style="text-transform:uppercase;font-size:11px;letter-spacing:0.5px;margin-bottom:4px;">Quoted to</div>' +
    '<div><strong>' + (esc(p.customerName)||'—') + '</strong></div><div class="muted">' + esc(p.customerEmail) + '</div></div>' +
    '<div><div class="muted" style="text-transform:uppercase;font-size:11px;letter-spacing:0.5px;margin-bottom:4px;">Project</div>' +
    '<div><strong>' + (esc(p.projectName)||'—') + '</strong></div><div class="muted">' + esc(p.roomType) + (p.address?(' · ' + esc(p.address)):'') + '</div></div></div>' +
    '<div style="margin-top:20px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:#6b6250;">' + est.count + ' cabinet' + (est.count===1?'':'s') + ' · ' + baseCount + ' base · ' + wallCount + ' wall · ' + tallCount + ' tall</div>' +
    '<div style="margin-top:16px;">' + lineRows +
    '<div class="cost-line"><span class="lbl">Subtotal</span><span class="mono">' + fmtMoney(est.subtotal) + '</span></div>' +
    '<div class="cost-line"><span class="lbl">Margin (' + state.rates.margin + '%)</span><span class="mono">' + fmtMoney(est.marginAmt) + '</span></div>' +
    '<div class="cost-line"><span class="lbl">GST (' + state.rates.gst + '%)</span><span class="mono">' + fmtMoney(est.gstAmt) + '</span></div>' +
    '<div class="cost-line total"><span class="lbl">Total (inc. GST)</span><span class="mono">' + fmtMoney(est.grandTotal) + '</span></div></div>' +
    '<div class="terms">This quotation is valid for 30 days from the date above. Pricing is based on cabinetry quantities and dimensions estimated from the supplied plan and is subject to confirmation on site. A deposit may be required prior to production. Final invoice may vary if site conditions differ from the plan supplied.</div>' +
    '</div></div>' +
    '<div class="btn-row no-print"><button class="btn ghost" onclick="prev()">Back</button><button class="btn primary" onclick="window.print()">Export as PDF</button></div>';
}

render();
</script>
</body>
</html>
